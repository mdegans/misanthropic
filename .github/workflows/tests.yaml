# Credit to GitHub Copilot for generating this file
name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Build the `bashd` daemon as a static linux-musl binary (the artifact the
  # `DockerSandbox` injects into a container) and run its unit tests.
  bashd-musl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static bashd
        run: cargo build -p bashd --release --target x86_64-unknown-linux-musl

      - name: Test bashd
        run: cargo test -p bashd --verbose

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Build
        run: cargo build --all-features --verbose

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-features

      - name: Test Without Default Features
        run: cargo test --all-features --verbose --no-default-features

      - name: Test With all Features
        run: cargo test --all-features --verbose

      # Test every feature individually so a missing cfg-gate can't hide
      # behind feature unification. The list comes from the [features] table
      # itself (the authoritative set, per CLAUDE.md) so it can't go stale.
      - name: Test each feature individually
        shell: bash
        run: |
          features=$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "misanthropic")
                   | .features | keys[]' |
            grep -vxE 'default|__skills')
          for f in $features; do
            echo "::group::feature: $f"
            cargo test -p misanthropic --features "$f" || exit 1
            echo "::endgroup::"
          done

      # Doc-tests the agent skill files so their code blocks can't drift from
      # the public API. Runs only the doctests (the skills module is doc-only).
      - name: Test Skill Docs
        run: cargo test -p misanthropic --features __skills --doc --verbose

      # This should only happen on push to main. PRs should not upload coverage.
      - name: Install llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'

      - name: Install nextest
        uses: taiki-e/install-action@nextest
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'

      - name: Write API key to api.key
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
        run: echo ${{ secrets.ANTHROPIC_API_KEY }} > api.key

      - name: Collect coverage data (including ignored tests)
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
        run: cargo llvm-cov nextest --all-features --run-ignored all --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
